name: Create GitHub Release

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: create-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ -z "$version" ]]; then
            echo "package.json version is empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        shell: bash
        env:
          OPENRELIX_RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PY'
          import html
          import os
          import re
          from pathlib import Path

          version = os.environ["OPENRELIX_RELEASE_VERSION"]
          article_id = "v" + version.replace(".", "-")
          changelog = Path("docs/changelog/v0.x.html")
          fallback = "See docs/changelog/v0.x.html for release notes."
          body = fallback
          if changelog.exists():
              text = changelog.read_text(encoding="utf-8")
              match = re.search(
                  r'<article[^>]+id="' + re.escape(article_id) + r'"[^>]*>.*?<div class="changelog-body">\s*<p>(.*?)</p>',
                  text,
                  re.S,
              )
              if match:
                  body = html.unescape(re.sub(r"<[^>]+>", "", match.group(1))).strip() or fallback
          Path("release-notes.md").write_text(body + "\n", encoding="utf-8")
          PY

      - name: Check npm version
        id: npm_version
        shell: bash
        run: |
          if npm view "openrelix@${{ steps.version.outputs.version }}" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "${{ steps.version.outputs.tag }}";
            const body = fs.readFileSync("release-notes.md", "utf8");

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
            }

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.notice(`Release already exists: ${existing.data.html_url}`);
              core.setOutput("release_url", existing.data.html_url);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease: false,
              make_latest: "true",
            });
            core.notice(`Created release: ${release.data.html_url}`);
            core.setOutput("release_url", release.data.html_url);

      - name: Dispatch npm publish
        if: steps.npm_version.outputs.published != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "publish.yml",
              ref: "main",
            });
            core.notice("Dispatched Publish npm workflow.");
