name: Publish npm

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org/"

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ -z "$version" ]]; then
            echo "package.json version is empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check npm version
        id: npm_version
        shell: bash
        run: |
          if npm view "openrelix@${{ steps.version.outputs.version }}" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "openrelix@${{ steps.version.outputs.version }} already exists on npm."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Block personal-info leaks
        if: steps.npm_version.outputs.published != 'true'
        run: python3 scripts/check_personal_info.py

      - name: Verify package contents
        if: steps.npm_version.outputs.published != 'true'
        run: npm pack --dry-run --json

      - name: Publish to npm
        if: steps.npm_version.outputs.published != 'true'
        run: npm publish --provenance
